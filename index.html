<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fresh New Life Story</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden; 
  position: relative;
}

body {
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#001d3d,#000814);
}

/* Glow BG */
body::before {
  content:"";
  position:absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 30%, #00bfff22, transparent 60%);
  animation: move 6s ease-in-out infinite alternate;
  z-index: 1;
  pointer-events: none;
}

@keyframes move {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.1); opacity: 1; }
}

/* CARD - কার্ডটি আরেকটু জুম/বড় করার জন্য max-width এবং padding বাড়ানো হয়েছে */
.card{
  width:92%;
  max-width:400px; /* আগের চেয়ে বড় ও প্রিমিয়াম দেখাবে */
  padding:30px 25px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  text-align:center;
  color:#fff;
  box-shadow:0 0 45px #00bfff33;
  animation:zoom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  z-index: 2;
}

@keyframes zoom{
  from{transform:scale(0.85);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* PROFILE */
.profile{
  width:125px; /* লোগো সামান্য বড় করা হয়েছে */
  height:125px;
  border-radius:50%;
  margin:auto;
  border:3px solid #00bfff;
  background:url("https://github.com/freshnewlifestory.png") center/cover;
  box-shadow:0 0 20px #00bfff;
}

/* NAME */
h1{
  margin-top:15px;
  font-size:24px; /* ফন্ট সাইজ সামান্য বাড়ানো হয়েছে */
  color:#00bfff;
  font-weight: 700;
  letter-spacing: 0.5px;
}

/* USERNAME - নামের নিচে ছোট ইউজারনেম */
.username {
  font-size: 14px;
  color: #a0aec0;
  margin-top: 4px;
  font-weight: 500;
  opacity: 0.85;
}

/* SOCIAL ICONS */
.social{
  margin-top:18px;
  margin-bottom: 5px;
}

.social a img{
  width:34px; /* সোশ্যাল আইকনগুলো একটু বড় করা হয়েছে */
  margin:0 10px;
  transition:0.3s;
}

.social a img:hover{
  transform:scale(1.2);
}

/* BIO BOX - সাবস্ক্রাইব বাটনের পরিবর্তে আপনার সুন্দর বায়ো */
.bio-box {
  margin-top: 20px;
  margin-bottom: 10px;
  padding: 15px;
  background: rgba(255, 255, 255, 0.04);
  border-left: 3px solid #00bfff; /* বাম পাশে সুন্দর সায়ান বর্ডার */
  border-radius: 10px;
  font-size: 13.5px;
  line-height: 1.6;
  text-align: left;
  color: #e2e8f0;
}

/* BUTTON */
.btn{
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:14px;
  padding:14px; /* বাটনগুলো ক্লিক করার সুবিধার্থে আরেকটু বড় করা হয়েছে */
  border-radius:15px;
  text-decoration:none;
  color:#fff;
  background:rgba(255,255,255,0.08);
  transition:0.3s;
  font-size: 15px;
  font-weight: 500;
}

.btn img{
  width:26px;
  border-radius: 50%;
}

.btn:hover{
  background:#00bfff;
  color:#000;
  transform:scale(1.03);
}

footer{
  margin-top:25px;
  font-size:12px;
  opacity:0.6;
}
</style></head><body><div class="card">
  <div class="profile"></div>
  
  <h1>FRESH NEW LIFE STORY</h1>
  <!-- নতুন ইউজারনেম পার্ট -->
  <div class="username">@freshnewlifestory</div>
  
  <div class="social">
    <a href="https://www.youtube.com/@freshnewlifestory" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    </a>
    <a href="https://www.facebook.com/freshnewlifestory" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png">
    </a>
    <a href="https://www.instagram.com/freshnewlifestory" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png">
    </a>
    <a href="https://www.tiktok.com/@freshnewlifestory" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
    </a>
  </div>

  <!-- আপনার দেওয়া নতুন বায়ো টেক্সট -->
  <div class="bio-box">
    👋 আমি সোশ্যাল মিডিয়ায় নতুন, তোমরা সবাই আমাকে সাপোর্ট করো। আমার সকল সোশ্যাল মিডিয়া অ্যাকাউন্টে তোমাদের উৎসাহের কারণে আমি আরও ভালো কনটেন্ট তৈরি করব। ধন্যবাদ!
  </div>

  <a href="https://www.youtube.com/@freshnewlifestory" target="_blank" class="btn">
    <img src="https://github.com/freshnewlifestory.png"> YouTube Channel
  </a>
  <a href="https://www.facebook.com/freshnewlifestory" target="_blank" class="btn">
    <img src="https://github.com/freshnewlifestory.png"> Facebook Page
  </a>
  <a href="https://www.instagram.com/freshnewlifestory" target="_blank" class="btn">
    <img src="https://github.com/freshnewlifestory.png"> Instagram Profile
  </a>
  <a href="https://www.tiktok.com/@freshnewlifestory" target="_blank" class="btn">
    <img src="https://github.com/freshnewlifestory.png"> TikTok Account
  </a>
  
  <footer>Made with ❤️ by FNL Sakib</footer>
</div></body>
</html>
