<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fresh New Life Story</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

html, body {
  width: 100%;
  height: 100vh;
  /* স্ক্রিন ফিক্সড রাখার প্রধান চাবিকাঠি */
  overflow: hidden; 
  position: relative;
}

body {
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#001d3d,#000814);
}

/* Glow BG - এটাকে স্ক্রিনের ভেতরের সাইজে লক করা হয়েছে */
body::before {
  content:"";
  position:absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 30%, #00bfff22, transparent 60%);
  animation: move 6s ease-in-out infinite alternate;
  z-index: 1;
  pointer-events: none; /* যাতে বাটনে ক্লিকে সমস্যা না হয় */
}

/* এনিমেশনটি এখন স্ক্রিনের বাইরে যাবে না, শুধু অপাসিটি ও স্কেল পরিবর্তন হবে */
@keyframes move {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.1); opacity: 1; }
}

/* CARD */
.card{
  width:90%;
  max-width:360px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  text-align:center;
  color:#fff;
  box-shadow:0 0 40px #00bfff44;
  animation:zoom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  z-index: 2;
}

@keyframes zoom{
  from{transform:scale(0.85);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* PROFILE */
.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:auto;
  border:3px solid #00bfff;
  background:url("https://github.com/freshnewlifestory.png") center/cover;
  box-shadow:0 0 20px #00bfff;
}

/* NAME */
h1{
  margin-top:15px;
  font-size:22px;
  color:#00bfff;
}

/* SOCIAL ICONS */
.social{
  margin-top:20px;
}

.social a img{
  width:32px;
  margin:0 8px;
  transition:0.3s;
}

.social a img:hover{
  transform:scale(1.2);
}

/* BUTTON */
.btn{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:15px;
  padding:12px;
  border-radius:15px;
  text-decoration:none;
  color:#fff;
  background:rgba(255,255,255,0.08);
  transition:0.3s;
}

.btn img{
  width:25px;
  border-radius: 50%;
}

.btn:hover{
  background:#00bfff;
  color:#000;
  transform:scale(1.05);
}

/* YT SUBSCRIBE ANIMATION */
.subscribe{
  margin-top:20px;
  padding:12px 25px;
  border-radius:50px;
  background:red;
  color:#fff;
  text-decoration:none;
  display:inline-block;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,0,0,0.7);}
  70%{box-shadow:0 0 0 15px rgba(255,0,0,0);}
  100%{box-shadow:0 0 0 0 rgba(255,0,0,0);}
}

footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.7;
}
</style></head><body><div class="card"><div class="profile"></div><h1>FRESH NEW LIFE STORY</h1><div class="social">

  </a>

</div><a href="https://www.youtube.com/@freshnewlifestory" target="_blank" class="subscribe">
