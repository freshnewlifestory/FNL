<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fresh New Life Story</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden; 
  position: relative;
}

body {
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#001d3d,#000814);
}

/* Glow BG */
body::before {
  content:"";
  position:absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 30%, #00bfff22, transparent 60%);
  animation: move 6s ease-in-out infinite alternate;
  z-index: 1;
  pointer-events: none;
}

@keyframes move {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.1); opacity: 1; }
}

/* CARD - বড় রেড মার্ক অনুযায়ী শ্যাডো আরও ডার্ক ও গাঢ় করা হয়েছে */
.card{
  width:92%;
  max-width:400px;
  padding:30px 25px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  text-align:center;
  color:#fff;
  /* এখানে শ্যাডো ও গ্লো ডার্ক করা হয়েছে */
  box-shadow: 0 0 50px rgba(0, 191, 255, 0.45), inset 0 0 15px rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  animation:zoom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  z-index: 2;
}

@keyframes zoom{
  from{transform:scale(0.85);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* PROFILE */
.profile{
  width:125px;
  height:125px;
  border-radius:50%;
  margin:auto;
  border:3px solid #00bfff;
  background:url("https://github.com/freshnewlifestory.png") center/cover;
  box-shadow:0 0 20px #00bfff;
}

/* NAME */
h1{
  margin-top:15px;
  font-size:24px;
  color:#00bfff;
  font-weight: 700;
}

/* USERNAME */
.username {
  font-size: 14px;
  color: #a0aec0;
  margin-top: 4px;
  font-weight: 500;
  opacity: 0.85;
}

/* SOCIAL ICONS - ছোট রেড মার্ক অনুযায়ী গোল ও মার্জিত করা হয়েছে */
.social{
  margin-top:20px;
  display: flex;
  justify-content: center;
  gap: 12px;
}

.social a img{
  width:38px;
  height: 38px;
  padding: 6px; /* আইকনটি গোল বর্ডারের ভেতরে সুন্দর দেখানোর জন্য */
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50%; /* গোল করা হয়েছে */
  transition: 0.3s;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.social a img:hover{
  transform:scale(1.15);
  background: #00bfff;
  border-color: #00bfff;
}

/* BIO BOX */
.bio-box {
  margin: 20px 0;
  padding: 15px;
  background: rgba(255, 255, 255, 0.04);
  border-left: 3px solid #00bfff;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.6;
  text-align: left;
  color: #e2e8f0;
}

/* BUTTON */
.btn{
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:14px;
  padding:14px;
  border-radius:15px;
  text-decoration:none;
  color:#fff;
  background:rgba(255,255,255,0.08);
  transition:0.3s;
  font-size: 15px;
}

.btn img{
  width:26px;
  border-radius: 50%;
}

.btn:hover{
  background:#00bfff;
  color:#000;
  transform:scale(1.03);
}

footer{
  margin-top:25px;
  font-size:12px;
  opacity:0.6;
}
</style></head><body><div class="card">
  <div class="profile"></div>
  <h1>FRESH NEW LIFE STORY</h1>
  <div class="username">@freshnewlifestory</div>
  
  <div class="social">
    <a href="https://www.youtube.com/@freshnewlifestory" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
    </a>
    <a href="https://www.facebook.com/freshnewlifestory" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384053.png" alt="Facebook">
    </a>
    <a href="https://www.instagram.com/freshnewlifestory" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png" alt="Instagram">
    </a>
    <a href="https://www.tiktok.com/@freshnewlifestory" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
    </a>
  </div>

  <div class="bio-box">
    👋 আমি সোশ্যাল মিডিয়ায় নতুন, তোমরা সবাই আমাকে সাপোর্ট করো। আমার সকল সোশ্যাল মিডিয়া অ্যাকাউন্টে তোমাদের উৎসাহের কারণে আমি আরও ভালো কনটেন্ট তৈরি করব। ধন্যবাদ!
  </div>

  <a href="https://www.youtube.com/@freshnewlifestory" target="_blank" class="btn">
    <img src="https://github.com/freshnewlifestory.png"> YouTube Channel
  </a>
  <a href="https://www.facebook.com/freshnewlifestory" target="_blank" class="btn">
    <img src="https://github.com/freshnewlifestory.png"> Facebook Page
  </a>
  <a href="https://www.instagram.com/freshnewlifestory" target="_blank" class="btn">
    <img src="https://github.com/freshnewlifestory.png"> Instagram Profile
  </a>
  <a href="https://www.tiktok.com/@freshnewlifestory" target="_blank" class="btn">
    <img src="https://github.com/freshnewlifestory.png"> TikTok Account
  </a>
  
  <footer>Made with ❤️ by FNL Sakib</footer>
</div></body>
</html>
