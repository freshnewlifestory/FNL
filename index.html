<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fresh New Life Story</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  min-height:100vh; /* height এর বদলে min-height ব্যবহার করা নিরাপদ */
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#001d3d,#000814);
  /* overflow সরিয়ে দেওয়া হয়েছে যাতে স্ক্রিন ফিট হতে সমস্যা না হয় */
  position: relative;
}

/* Glow BG */
body::before{
  content:"";
  position:absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:radial-gradient(circle,#00bfff22,transparent 40%);
  animation:move 10s linear infinite;
  z-index: 1;
}

@keyframes move{
  0%{transform:translate(0,0);}
  50%{transform:translate(-50px,-50px);} /* এনিমেশন স্ক্রিনের বাইরে যাওয়া আটকাবে */
  100%{transform:translate(0,0);}
}

/* CARD */
.card{
  width:90%;
  max-width:360px; /* মোবাইল স্ক্রিনের জন্য পারফেক্ট সাইজ */
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px); /* Safari ব্রাউজারের জন্য */
  text-align:center;
  color:#fff;
  box-shadow:0 0 40px #00bfff55;
  animation:zoom 1s ease;
  position: relative;
  z-index: 2; /* কার্ডটি যেন ব্যাকগ্রাউন্ডের উপরে থাকে */
}

@keyframes zoom{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* PROFILE */
.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:auto;
  border:3px solid #00bfff;
  background:url("https://github.com/freshnewlifestory.png") center/cover;
  box-shadow:0 0 20px #00bfff;
}

/* NAME */
h1{
  margin-top:15px;
  font-size:22px;
  color:#00bfff;
}

/* SOCIAL ICONS */
.social{
  margin-top:20px;
}

.social a img{
  width:32px;
  margin:0 8px;
  transition:0.3s;
}

.social a img:hover{
  transform:scale(1.2);
}

/* BUTTON */
.btn{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:15px;
  padding:12px;
  border-radius:15px;
  text-decoration:none;
  color:#fff;
  background:rgba(255,255,255,0.08);
  transition:0.3s;
}

.btn img{
  width:25px;
  border-radius: 50%; /* প্রোফাইল পিকচারটি গোল দেখানোর জন্য */
}

.btn:hover{
  background:#00bfff;
  color:#000;
  transform:scale(1.05);
}

/* YT SUBSCRIBE ANIMATION */
.subscribe{
  margin-top:20px;
  padding:12px 25px;
  border-radius:50px;
  background:red;
  color:#fff;
  text-decoration:none;
  display:inline-block;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,0,0,0.7);}
  70%{box-shadow:0 0 0 15px rgba(255,0,0,0);}
  100%{box-shadow:0 0 0 0 rgba(255,0,0,0);}
}

footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.7;
}
</style></head><body><div class="card"><div class="profile"></div><h1>FRESH NEW LIFE STORY</h1><div class="social">

</div><a href="https://www.youtube.com/@freshnewlifestory" target="_blank" class="subscribe">
