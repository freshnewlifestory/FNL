<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fresh New Life Story</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#000814,#001d3d,#003566);
  overflow:hidden;
}

/* Background Glow Animation */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle,#00bfff22,transparent 40%);
  animation: moveBg 10s linear infinite;
}

@keyframes moveBg{
  0%{transform:translate(0,0);}
  100%{transform:translate(-200px,-200px);}
}

/* CARD */
.card{
  width:90%;
  max-width:380px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  text-align:center;
  color:#fff;
  box-shadow:0 0 40px rgba(0,0,0,0.8);
  transform:scale(1.05);
  animation: zoomIn 1s ease;
}

@keyframes zoomIn{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1.05);opacity:1;}
}

/* PROFILE */
.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:auto;
  border:4px solid #00bfff;
  background:url("https://i.imgur.com/yourimage.png") center/cover;
  box-shadow:0 0 20px #00bfff;
}

/* NAME */
h1{
  margin-top:15px;
  font-size:22px;
  font-weight:700;
  color:#00bfff;
}

/* USERNAME */
.username{
  font-size:14px;
  opacity:0.8;
  margin-top:5px;
}

/* DESC */
.desc{
  margin-top:15px;
  font-size:13px;
  line-height:1.5;
  opacity:0.9;
}

/* SOCIAL ICONS */
.social{
  margin-top:20px;
}

.social a{
  margin:0 8px;
  font-size:20px;
  text-decoration:none;
  color:#fff;
  transition:0.3s;
}

.social a:hover{
  color:#00bfff;
  transform:scale(1.2);
}

/* BUTTON */
.btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  text-decoration:none;
  color:#fff;
  transition:0.3s;
}

.btn:hover{
  background:#00bfff;
  color:#000;
  transform:scale(1.05);
}

footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.7;
}

</style>
</head>

<body>

<div class="card">

<div class="profile"></div>

<h1>FRESH NEW LIFE STORY</h1>

<div class="username">@freshnewlifestory</div>

<div class="desc">
Stay connected with me on all platforms 🚀
</div>

<div class="social">
  <a href="#">▶️</a>
  <a href="#">📘</a>
  <a href="#">📸</a>
  <a href="#">🎵</a>
</div>

<a href="#" class="btn">YouTube Channel</a>
<a href="#" class="btn">Facebook Page</a>
<a href="#" class="btn">Instagram Profile</a>
<a href="#" class="btn">TikTok Account</a>

<footer>Made with ❤️ by FNL Sakib</footer>

</div>

</body>
</html>
