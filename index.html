<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fresh New Life Story</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(270deg,#0f2027,#203a43,#2c5364);
  background-size:600% 600%;
  animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.card{
  width:360px;
  padding:25px;
  border-radius:25px;
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.08);
  box-shadow:0 10px 50px rgba(0,0,0,0.6);
  text-align:center;
  color:#fff;
}

.profile{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid #fff;
  box-shadow:0 0 25px rgba(255,255,255,0.7);
  margin:auto;
  background:url('https://github.com/freshnewlifestory.png') center/cover;
}

h1{
  margin-top:15px;
  font-size:20px;
  white-space:nowrap;
}

.username{
  opacity:0.8;
  font-size:14px;
  margin-top:5px;
}

.badge{
  display:inline-block;
  margin-top:10px;
  padding:6px 15px;
  border-radius:20px;
  background:linear-gradient(45deg,#00f2fe,#4facfe);
  font-size:12px;
}

.desc{
  font-size:13px;
  margin:15px 0;
  opacity:0.8;
}

.social{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:20px;
}

.social a{
  width:45px;
  height:45px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  font-size:20px;
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.social a:hover{
  transform:scale(1.2);
  background:#fff;
  color:#000;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:50px;
  text-decoration:none;
  color:#fff;
  background: linear-gradient(45deg,#4facfe,#00f2fe);
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-4px) scale(1.03);
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.footer{
  font-size:12px;
  margin-top:10px;
  opacity:0.7;
}
</style>

</head>

<body>

<div class="card">

<div class="profile"></div>

<h1>Fresh New Life Story</h1>
<div class="username">@freshnewlifestory</div>

<div class="badge">CONTENT CREATOR</div>

<div class="desc">
Stay connected with me on all platforms 🚀
</div>

<div class="social">
<a href="https://www.youtube.com/@freshnewlifestory">▶</a>
<a href="https://www.facebook.com/freshnewlifestory">f</a>
<a href="https://www.instagram.com/freshnewlifestory">📷</a>
<a href="https://www.tiktok.com/@freshnewlifestory">♪</a>
</div>

<a href="https://www.youtube.com/@freshnewlifestory" class="btn">🎬 YouTube Channel</a>
<a href="https://www.facebook.com/freshnewlifestory" class="btn">📘 Facebook Page</a>
<a href="https://www.instagram.com/freshnewlifestory" class="btn">📷 Instagram Profile</a>
<a href="https://www.tiktok.com/@freshnewlifestory" class="btn">🎵 TikTok Account</a>

<div class="footer">Made with ❤️ by FNL Sakib</div>

</div>

</body>
</html>
