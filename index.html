<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FNL Sakib | Official Links</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(-45deg,#0f172a,#1e3a8a,#2563eb,#0f172a);
background-size:400% 400%;
animation:bg 15s ease infinite;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:100%;
max-width:430px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.15);
border-radius:30px;
padding:30px 25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

.profile{
width:140px;
height:140px;
border-radius:50%;
border:4px solid rgba(255,255,255,0.9);
object-fit:cover;
box-shadow:0 0 30px rgba(255,255,255,.35);
}

h1{
color:white;
margin-top:18px;
font-size:32px;
font-weight:700;
}

.username{
color:#cbd5e1;
font-size:15px;
margin-top:5px;
}

.bio{
color:white;
opacity:.85;
margin:18px 0 25px;
font-size:14px;
line-height:1.6;
}

.badge{
display:inline-block;
margin-top:10px;
padding:7px 15px;
background:#2563eb;
color:white;
border-radius:999px;
font-size:12px;
font-weight:600;
}

.socials{
display:flex;
justify-content:center;
gap:12px;
margin:25px 0;
}

.socials a{
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:rgba(255,255,255,0.12);
transition:.3s;
}

.socials a:hover{
transform:translateY(-4px);
}

.socials img{
width:26px;
height:26px;
}

.link{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
text-decoration:none;
color:white;
font-weight:600;
padding:18px;
margin:14px 0;
border-radius:18px;
background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.15);
transition:.3s;
}

.link:hover{
transform:scale(1.03);
background:rgba(255,255,255,0.20);
}

.mini-logo{
width:30px;
height:30px;
border-radius:50%;
object-fit:cover;
}

.footer{
margin-top:25px;
color:#cbd5e1;
font-size:13px;
}
</style>
</head>

<body>

<div class="card">

<img src="https://avatars.githubusercontent.com/freshnewlifestory" class="profile">

<p class="username">@freshnewlifestory</p>

<div class="badge">CONTENT CREATOR</div>

<p class="bio">
Welcome to my official social hub.
Follow me on all platforms and stay connected with my latest content.
</p>

</div>
